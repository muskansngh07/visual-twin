<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PlantFATE Visual Twin</title>
        <link rel="stylesheet" href="style.css"> 
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/BufferGeometryUtils.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    </head>
    <body>
        <div id="main-container"> 

            <main id="simulation-viewport" class="viewport-box">
                
                <div id="viewport-profiles">
                    <div class="hud-panel" id="hud-species-1">
                        <h3 class="hud-species-name">Species 1 Profile</h3>
                        <hr class="hud-divider">
                        <div class="hud-metric"><span class="label">Canopy Shape (m):</span><span id="s1-shape-m" class="val">2.5</span></div>
                        <div class="hud-metric"><span class="label">Canopy Shape (n):</span><span id="s1-shape-n" class="val">1.8</span></div>
                    </div>

                    <div class="hud-panel" id="hud-species-2">
                        <h3 class="hud-species-name">Species 2 Profile</h3>
                        <hr class="hud-divider">
                        <div class="hud-metric"><span class="label">Canopy Shape (m):</span><span id="s2-shape-m" class="val">1.8</span></div>
                        <div class="hud-metric"><span class="label">Canopy Shape (n):</span><span id="s2-shape-n" class="val">1.8</span></div>
                    </div>

                    <div class="hud-panel" id="hud-species-3">
                        <h3 class="hud-species-name">Species 3 Profile</h3>
                        <hr class="hud-divider">
                        <div class="hud-metric"><span class="label">Canopy Shape (m):</span><span id="s3-shape-m" class="val">1.8</span></div>
                        <div class="hud-metric"><span class="label">Canopy Shape (n):</span><span id="s3-shape-n" class="val">2.3</span></div>
                    </div>
                </div>
                
                <div id="active-stats" style="position:absolute; bottom:20px; left:20px; color:white; z-index:5; font-family:sans-serif; background:rgba(0,0,0,0.5); padding:10px; border-radius:4px;">
                    <div>Year: <span id="stat-year">2000</span></div>
                    <div>Active Cohorts: <span id="stat-cohorts">0</span></div>
                    <div>Total Trees Rendered: <span id="stat-trees">0</span></div>
                </div>
            </main>

            <div id="bottom-bar">
                <div id="timeline">
                    <div id="controls-row">
                        <span id="keys">
                            <span class="key"><span class="keycap">N</span> next</span>
                            <span class="key"><span class="keycap">P</span> prev</span>
                            <span class="key"><span class="keycap">Space</span> play/pause</span>
                            <span class="key"><span class="keycap">R</span> reset camera</span>
                        </span>
                    </div>
                </div>
            </div>
        </div> 
        <script src="twin.js"></script>
    </body>
</html>
